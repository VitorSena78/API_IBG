spring.application.name=ibg-clinica
spring.output.ansi.enabled=ALWAYS

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ibg_clinica?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Senha@123

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=ibg-clinica-secret-key-change-in-production-must-be-at-least-256-bits-long
app.jwt.expiration-ms=86400000
